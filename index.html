<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light only;
    --bg:#f3f5f8;
    --ink:#0c2340;
    --ink-soft:#5d738f;
    --blue-900:#0a2a5e;
    --blue-700:#1450c4;
    --blue-600:#1e5bd6;
    --blue-500:#3b82f6;
    --blue-100:#dbeafe;
    --blue-50:#eef4ff;
    --line:#dde8fb;
    --shadow:0 6px 24px rgba(12,35,64,.10);
    --shadow-sm:0 2px 8px rgba(12,35,64,.07);
    --sheet:420px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:var(--sheet);margin:0 auto;min-height:100vh;position:relative;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:30;
    display:flex;align-items:center;gap:12px;
    padding:14px 16px;background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .icon-btn{
    width:42px;height:42px;border-radius:13px;
    display:grid;place-items:center;color:var(--blue-700);
    background:var(--blue-50);transition:transform .15s,background .15s;
  }
  .icon-btn:active{transform:scale(.92);background:var(--blue-100);}
  .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:-.4px;flex:1;}
  .brand span{color:var(--blue-600);}
  .sb-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.6px;}
  .sb-logo span{color:var(--blue-500);}
  .add-btn{
    background:var(--blue-600);color:#fff;height:42px;padding:0 16px;border-radius:13px;
    font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;
    box-shadow:var(--shadow-sm);transition:transform .15s,background .15s;
  }
  .add-btn:active{transform:scale(.94);background:var(--blue-700);}
  .add-btn svg{width:18px;height:18px;}

  /* ---------- Section heading ---------- */
  .section-head{padding:20px 18px 4px;}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue-500);}
  .section-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:-1px;margin:2px 0 0;}

  /* ---------- Tabs (Prospect / Watched) ---------- */
  .tabs{display:flex;gap:6px;margin:16px 18px 0;background:var(--blue-50);padding:5px;border-radius:14px;}
  .tab{
    flex:1;text-align:center;padding:10px;border-radius:10px;font-weight:600;font-size:14px;
    color:var(--ink-soft);transition:color .2s;position:relative;z-index:1;
  }
  .tab.active{color:#fff;}
  .tab-pill{
    position:absolute;top:5px;bottom:5px;border-radius:10px;background:var(--blue-600);
    box-shadow:var(--shadow-sm);transition:transform .28s cubic-bezier(.4,1.3,.5,1),width .28s;z-index:0;
  }
  .tabs{position:relative;}

  /* ---------- Filters ---------- */
  .filters{padding:16px 18px 4px;}
  .filter-label{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:7px;}
  .sort-row{display:flex;gap:8px;margin-bottom:14px;}
  .sort-btn{
    flex:1;padding:9px;border-radius:11px;border:1.5px solid var(--line);
    font-weight:600;font-size:13px;color:var(--ink-soft);background:#fff;transition:all .18s;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .sort-btn svg{width:15px;height:15px;}
  .sort-btn.active{border-color:var(--blue-600);color:var(--blue-700);background:var(--blue-50);}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;padding:7px 14px;border-radius:999px;font-size:13px;font-weight:500;
    background:#fff;border:1.5px solid var(--line);color:var(--ink-soft);white-space:nowrap;transition:all .18s;
  }
  .chip.active{background:var(--blue-600);border-color:var(--blue-600);color:#fff;}

  /* ---------- List ---------- */
  .list{padding:14px 16px 110px;display:flex;flex-direction:column;gap:12px;flex:1;}
  .card{
    background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px;
    box-shadow:var(--shadow-sm);position:relative;animation:rise .35s ease both;
    transition:transform .15s;
  }
  .card:active{transform:scale(.985);}
  @keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  .card-top{display:flex;gap:13px;align-items:flex-start;}
  .score{
    flex:0 0 auto;width:50px;height:50px;border-radius:14px;display:grid;place-items:center;
    font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;line-height:1;
  }
  .card-title{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;letter-spacing:-.3px;margin:0;line-height:1.25;}
  .card-director{font-size:12.5px;color:var(--ink-soft);margin-top:3px;}
  .card-desc{font-size:13.5px;color:var(--ink);opacity:.82;line-height:1.5;margin:11px 0 0;}
  .card-themes{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
  .theme-tag{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:var(--blue-50);color:var(--blue-700);}
  .card-ctrl{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .mini{display:inline-flex;align-items:center;justify-content:center;gap:5px;border-radius:9px;font-weight:600;transition:all .15s;}
  .mini-watch{padding:6px 11px;font-size:11.5px;border:1px solid var(--line);background:#fff;color:var(--blue-600);}
  .mini-watch svg{width:13px;height:13px;}
  .mini-watch:active{background:var(--blue-50);}
  .mini-watch.back{color:var(--ink-soft);}
  .mini-edit{width:30px;height:30px;color:#aab8d0;background:transparent;border:1px solid transparent;}
  .mini-edit svg{width:16px;height:16px;}
  .mini-edit:active{color:var(--blue-600);background:var(--blue-50);}
  .del-confirm{display:none;}
  .del-btn{display:none;width:100%;margin-top:14px;padding:15px;border-radius:15px;background:transparent;border:none;color:#e74c3c;font-weight:600;font-size:15px;text-align:center;}
  .del-btn.show{display:block;}
  .del-btn:active{opacity:.7;}

  /* ---------- Empty ---------- */
  .empty{text-align:center;padding:64px 28px;color:var(--ink-soft);}
  .empty svg{width:54px;height:54px;color:var(--blue-100);margin-bottom:14px;}
  .empty h3{font-family:'Space Grotesk',sans-serif;font-size:18px;color:var(--ink);margin:0 0 6px;}
  .empty p{font-size:14px;margin:0;line-height:1.5;}

  /* ---------- Sidebar ---------- */
  .scrim{position:fixed;inset:0;background:rgba(10,42,94,.45);z-index:40;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(2px);}
  .scrim.show{opacity:1;pointer-events:auto;}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;width:80%;max-width:300px;z-index:50;
    background:var(--blue-900);color:#fff;transform:translateX(-104%);transition:transform .32s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;padding:0 0 28px;
  }
  .sidebar.open{transform:none;}
  .sb-head{padding:30px 26px 22px;}
  .sb-sub{font-size:13px;color:#9db8e8;margin-top:4px;}
  .nav{padding:14px;display:flex;flex-direction:column;gap:8px;}
  .nav-item{
    display:flex;align-items:center;gap:15px;padding:16px 18px;border-radius:15px;
    font-weight:600;font-size:16px;color:#c7d8f5;transition:all .18s;text-align:left;
  }
  .nav-item svg{width:24px;height:24px;flex:0 0 auto;}

/* ---------- score color: deeper blue = higher score ---------- */
function lerp(a,b,t){ return Math.round(a+(b-a)*t); }
function scoreColor(n){
  const t = Math.max(0,Math.min(1,n/10));
  // light blue (219,234,254) -> deep navy (10,42,94)
  const r=lerp(219,10,t), g=lerp(234,42,t), b=lerp(254,94,t);
  return { bg:`rgb(${r},${g},${b})`, fg: t>=0.45 ? "#ffffff" : "#0a2a5e" };
}

/* ---------- helpers ---------- */
function fmtScore(n){ return Number(n).toFixed(1); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
const $ = s => document.querySelector(s);

/* ---------- build theme chips & picker ---------- */
function buildChips(){
  const wrap = $("#themeChips");
  wrap.innerHTML = "";
  const all = document.createElement("button");
  all.className = "chip" + (state.theme==="all"?" active":"");
  all.textContent = "Todos";
  all.onclick = ()=>{ state.theme="all"; buildChips(); render(); };
  wrap.appendChild(all);
  THEMES.forEach(t=>{
    const c = document.createElement("button");
    c.className = "chip" + (state.theme===t?" active":"");
    c.textContent = t;
    c.onclick = ()=>{ state.theme = state.theme===t?"all":t; buildChips(); render(); };
    wrap.appendChild(c);
  });
}
function buildPicker(){
  const wrap = $("#themePick");
  wrap.innerHTML = "";
  THEMES.forEach(t=>{
    const b = document.createElement("button");
    b.className = "pick" + (state.formThemes.includes(t)?" on":"");
    b.textContent = t;
    b.onclick = ()=>{
      if(state.formThemes.includes(t)) state.formThemes = state.formThemes.filter(x=>x!==t);
      else state.formThemes.push(t);
      buildPicker();
    };
    wrap.appendChild(b);
  });
}

/* ---------- render list ---------- */
function render(){
  // counts
  $("#countMovie").textContent = items.filter(i=>i.type==="movie").length;
  $("#countSeries").textContent = items.filter(i=>i.type==="series").length;

  let rows = items.filter(i=>i.type===state.type && i.status===state.status);
  if(state.theme!=="all") rows = rows.filter(i=>i.themes.includes(state.theme));
  if(state.sort==="az") rows.sort((a,b)=>a.name.localeCompare(b.name,"pt"));
  else rows.sort((a,b)=>b.rating-a.rating || a.name.localeCompare(b.name,"pt"));

  const list = $("#list");
  list.innerHTML = "";

  if(rows.length===0){
    const noun = state.type==="movie" ? "filme" : "série";
    const where = state.status==="prospect" ? "que você quer ver" : "que você já assistiu";
    list.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 4v16M17 4v16"/></svg>
      <h3>Nada por aqui ainda</h3>
      <p>Nenhum ${noun} ${where}.<br>Toque em <b>Novo</b> para começar a lista.</p>
    </div>`;
    return;
  }

  rows.forEach(it=>{
    const sc = scoreColor(it.rating);
    const card = document.createElement("div");
    card.className = "card";
    const themesHtml = it.themes.map(t=>`<span class="theme-tag">${t}</span>`).join("");
    const watched = it.status==="watched";
    const watchLabel = watched ? "Prospect" : "Watched";
    const watchIcon = watched
      ? `<path d="M11 5l-7 7 7 7M4 12h16"/>`
      : `<path d="M5 12l5 5L20 7"/>`;
    card.innerHTML = `
      <div class="card-top">
        <div class="score" style="background:${sc.bg};color:${sc.fg}">${fmtScore(it.rating)}</div>
        <div style="min-width:0;flex:1">
          <h2 class="card-title">${escapeHtml(it.name)}</h2>
          ${it.director?`<div class="card-director">Dir. ${escapeHtml(it.director)}</div>`:""}
        </div>
        <div class="card-ctrl">
          <button class="mini mini-watch${watched?' back':''}" data-act="move"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${watchIcon}</svg>${watchLabel}</button>
          <button class="mini mini-edit" data-act="edit" aria-label="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
        </div>
      </div>
      ${it.description?`<p class="card-desc">${escapeHtml(it.description)}</p>`:""}
      ${themesHtml?`<div class="card-themes">${themesHtml}</div>`:""}`;
    card.querySelector('[data-act="move"]').onclick = ()=>toggleStatus(it.id);
    card.querySelector('[data-act="edit"]').onclick = ()=>openSheet(it.id);
    list.appendChild(card);
  });
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------- actions ---------- */
async function toggleStatus(id){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  it.status = it.status==="prospect" ? "watched" : "prospect";
  await save(); render();
}
async function removeItem(id){
  const it = items.find(i=>i.id===id);
  if(!it) return;
  items = items.filter(i=>i.id!==id);
  await save(); closeSheet(); render();
}

/* ---------- tabs ---------- */
function moveTabPill(){
  const tabs = document.querySelectorAll("#tabs .tab");
  const active = state.status==="prospect" ? tabs[0] : tabs[1];
  const pill = $("#tabPill");
  pill.style.width = active.offsetWidth + "px";
  pill.style.transform = `translateX(${active.offsetLeft-5}px)`;
}
function setStatus(s){
  state.status = s;
  document.querySelectorAll("#tabs .tab").forEach(t=>t.classList.toggle("active",t.dataset.status===s));
  moveTabPill(); render();
}

/* ---------- type switch ---------- */
function setType(t){
  state.type = t;
  $("#sectionTitle").textContent = t==="movie" ? "Filmes" : "Séries";
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.type===t));
  closeSidebar();
  render();
}

/* ---------- sidebar ---------- */
function openSidebar(){ $("#sidebar").classList.add("open"); $("#scrim").classList.add("show"); }
function closeSidebar(){ $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("show"); }

/* ---------- sheet (add/edit) ---------- */
function openSheet(id){
  state.editId = id || null;
  const noun = state.type==="movie" ? "filme" : "série";
  if(id){
    const it = items.find(i=>i.id===id);
    $("#sheetTitle").textContent = "Editar";
    $("#fName").value = it.name;
    $("#fDirector").value = it.director||"";
    $("#fDesc").value = it.description||"";
    $("#fRating").value = it.rating;
    state.formThemes = it.themes.slice();
    $("#saveBtn").textContent = "Salvar";
    $("#deleteBtn").classList.add("show");
  }else{
    $("#sheetTitle").textContent = "Nov"+(state.type==="movie"?"o filme":"a série");
    $("#fName").value=""; $("#fDirector").value=""; $("#fDesc").value="";
    $("#fRating").value=0;
    state.formThemes=[];
    $("#saveBtn").textContent = "Adicionar";
    $("#deleteBtn").classList.remove("show");
  }
  updateRating();
  buildPicker();
  $("#nameErr").classList.remove("show");
  $("#sheet").classList.add("open"); $("#sheetScrim").classList.add("show");
}
function closeSheet(){ $("#sheet").classList.remove("open"); $("#sheetScrim").classList.remove("show"); }

function updateRating(){
  const v = parseFloat($("#fRating").value);
  const el = $("#ratingVal");
  el.textContent = fmtScore(v);
  const sc = scoreColor(v);
  el.style.background = sc.bg; el.style.color = sc.fg;
}

async function saveItem(){
  const name = $("#fName").value.trim();
  if(!name){ $("#nameErr").classList.add("show"); return; }
  const data = {
    name,
    director: $("#fDirector").value.trim(),
    description: $("#fDesc").value.trim(),
    themes: state.formThemes.slice(),
    rating: parseFloat($("#fRating").value),
    type: state.type
  };
  let landed;
  if(state.editId){
    const it = items.find(i=>i.id===state.editId);
    Object.assign(it, data);
    landed = it.status;
  }else{
    items.push({ id:uid(), status:"prospect", ...data });
    landed = "prospect";
  }
  await save();
  // jump to the list the item landed in
  setStatus(landed);
  closeSheet();
  render();
}

/* ---------- wire up ---------- */
$("#menuBtn").onclick = openSidebar;
$("#scrim").onclick = closeSidebar;
$("#addBtn").onclick = ()=>openSheet(null);
$("#closeSheet").onclick = closeSheet;
$("#sheetScrim").onclick = closeSheet;
$("#saveBtn").onclick = saveItem;
$("#fRating").oninput = updateRating;
$("#fName").oninput = ()=>$("#nameErr").classList.remove("show");

document.querySelectorAll("#tabs .tab").forEach(t=> t.onclick = ()=>setStatus(t.dataset.status));
document.querySelectorAll(".nav-item").forEach(n=> n.onclick = ()=>setType(n.dataset.type));
document.querySelectorAll(".sort-btn").forEach(b=> b.onclick = ()=>{
  state.sort = b.dataset.sort;
  document.querySelectorAll(".sort-btn").forEach(x=>x.classList.toggle("active",x===b));
  render();
});
$("#deleteBtn").onclick = ()=>{ if(state.editId) removeItem(state.editId); };

$("#iconPrepBtn").onclick = ()=>{ closeSidebar(); $("#iconPrep").classList.add("show"); };
$("#iconPrepClose").onclick = ()=>{ $("#iconPrep").classList.remove("show"); };

window.addEventListener("resize", moveTabPill);

/* ---------- boot ---------- */
(async function(){
  await load();
  await seedData();
  await seedData2();
  await seedData3();
  await seedData4();
  // Open on Séries > Prospect to show new content
  state.type = "series";
  state.status = "prospect";
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.toggle("active",n.dataset.type==="series"));
  $("#sectionTitle").textContent = "Séries";
  document.querySelectorAll("#tabs .tab").forEach(t=>t.classList.toggle("active",t.dataset.status==="prospect"));
  buildChips();
  buildPicker();
  render();
  requestAnimationFrame(moveTabPill);
})();
</script>
</body>
</html>
